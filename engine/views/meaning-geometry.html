<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meaning Geometry Map — DSLO Meaning Physics Engine</title>
    <script src="../loader.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #fafafa;
        }
        h1 {
            margin-bottom: 10px;
        }
        #canvas {
            border: 1px solid #ccc;
            width: 600px;
            height: 400px;
            background: white;
        }
        pre {
            background: #eee;
            padding: 10px;
            border-radius: 6px;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<h1>Meaning Geometry Map</h1>
<p>This view loads the six DSLO meaning‑physics fields and renders a simple geometry projection.</p>

<canvas id="canvas" width="600" height="400"></canvas>

<h2>Loaded Field Data (Debug View)</h2>
<pre id="output">Loading fields…</pre>

<script>
function drawGeometry(fields) {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    // Background
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Simple v0.1 visualization:
    const colors = {
        drift: "#ff5555",
        continuity: "#55aaff",
        curvature: "#ffaa00",
        collapse: "#aa55ff",
        restoration: "#55cc55",
        susceptibility: "#ff88aa"
    };

    const labels = Object.keys(colors);
    const spacing = canvas.width / (labels.length + 1);

    labels.forEach((label, i) => {
        const x = spacing * (i + 1);
        const y = canvas.height / 2;

        ctx.beginPath();
        ctx.arc(x, y, 30, 0, Math.PI * 2);
        ctx.fillStyle = colors[label];
        ctx.fill();

        ctx.fillStyle = "#000";
        ctx.font = "12px Arial";
        ctx.textAlign = "center";
        ctx.fillText(label, x, y + 50);
    });
}

// Use the shared loader
Engine.loadFields().then(fields => {
    drawGeometry(fields);
    document.getElementById("output").textContent =
        JSON.stringify(fields, null, 2);
});
</script>

</body>
</html>
