<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Susceptibility Explorer — Meaning Physics Engine</title>
    <script src="../loader.js"></script>
    <style>
        body { font-family: Arial; margin: 40px; }
        #canvas { border: 1px solid #ccc; background: white; }
        pre { background: #eee; padding: 10px; }
    </style>
</head>
<body>

<h1>Susceptibility Explorer</h1>
<p>Highlights regions where small perturbations cause large semantic changes.</p>

<canvas id="canvas" width="600" height="400"></canvas>

<h2>Loaded Susceptibility Windows (Debug)</h2>
<pre id="output">Loading…</pre>

<script>
Engine.loadFields().then(fields => {
    document.getElementById("output").textContent =
        JSON.stringify(fields.susceptibility, null, 2);

    const ctx = document.getElementById("canvas").getContext("2d");

    // v0.1 placeholder visualization
    ctx.fillStyle = "#ff88aa";
    ctx.fillRect(200, 150, 200, 100);

    ctx.fillStyle = "#000";
    ctx.fillText("Susceptibility Window Placeholder", 210, 210);
});
</script>

</body>
</html>
